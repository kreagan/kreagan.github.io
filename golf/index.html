// ─── UTILS ───
function parseOdds(str){if(!str)return{name:"",odds:"N/A",oddsNum:99999};const m=str.match(/^(.+?)\s+([+-]\d+)$/);
  if(!m)return{name:str.trim(),odds:"N/A",oddsNum:99999};return{name:m[1].trim(),odds:m[2],oddsNum:parseInt(m[2].replace("+",""))};}
function buildTiers(odds){const g=odds.map((s,i)=>({...parseOdds(s),rank:i+1,raw:s}));
  return{top10:{label:"Top 10",maxPicks:2,golfers:g.filter(x=>x.rank<=10)},mid:{label:"11–30",maxPicks:3,golfers:g.filter(x=>x.rank>10&&x.rank<=30)},rest:{label:"31+",maxPicks:2,golfers:g.filter(x=>x.rank>30)}};}
function getTier(raw,tiers){for(const[k,t]of Object.entries(tiers))if(t.golfers.some(g=>g.raw===raw))return k;return null;}

// Score lookup handles both old format (number) and new format ({s, thru})
function getScore(scores,name){const v=scores[name];if(v==null)return{score:null,thru:null,rounds:null};if(typeof v==="number")return{score:v,thru:18,rounds:null};return{score:v.s,thru:v.thru,rounds:v.r||null};}
function calcScore(picks,scores){
  const gs=picks.map(p=>{const n=parseOdds(p).name;const{score,thru,rounds}=getScore(scores,n);return{name:n,raw:p,score,thru,rounds};});
  const ws=gs.filter(g=>g.score!==null).sort((a,b)=>a.score-b.score);const b4=ws.slice(0,4);
  return{golfers:gs.map(g=>({...g,counting:b4.some(b=>b.name===g.name)})),total:ws.length>=4?b4.reduce((s,g)=>s+g.score,0):null};}
function fmt(s){return s==null?"–":s===0?"E":s>0?`+${s}`:`${s}`;}
function fmtThru(thru){if(thru==null)return"";if(thru>=18)return"F";return`${thru}`;}

  return <header className="hdr"><div className="hdr-top"><div className="logo">

      className={`tab ${view===t.id?"on":""}`}><span className="tab-i">{t.icon}</span>

function Banner({tournament:t}){if(!t)return null;
  const s={active:{c:"live",l:"LIVE"},upcoming:{c:"up",l:"UPCOMING"},completed:{c:"done",l:"FINAL"}}[t.status]||{c:"up",l:"UPCOMING"};
  return <div className="banner"><div><span className="bn">{t.name}</span>
    {t.course&&<span className="bc">{t.course}</span>}</div><span className={`badge ${s.c}`}>{s.l}</span></div>;}

function ThruBadge({thru}){if(thru==null)return <span className="thru-badge">–</span>;
  const done=thru>=18;return <span className={`thru-badge ${done?"done":"live"}`}>{done?"F":thru}</span>;}

function RoundBadges({rounds}){if(!rounds)return null;
  const box={display:"inline-flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
    width:36,height:34,background:"var(--bd)",borderRadius:4,flexShrink:0};
  const lbl={fontSize:9,fontFamily:"var(--fm)",color:"var(--dim)",fontWeight:600,lineHeight:1};
  const val={fontSize:12,fontFamily:"var(--fm)",fontWeight:600,lineHeight:1.2};
  return <div style={{display:"flex",gap:3,marginTop:4}}>{rounds.map((r,i)=>
    <span key={i} style={{...box,opacity:r!=null?1:0.35}} title={`Round ${i+1}`}>
      <span style={lbl}>R{i+1}</span>
      <span style={{...val,color:r!=null?"var(--tx)":"var(--dim)"}}>{r!=null?r:"-"}</span>
    </span>)}</div>;}

function RefreshTimer({lastUpdated,onRefresh,liveStatus,autoRefresh,setAutoRefresh}){
  const[ago,setAgo]=useState("");
  useEffect(()=>{const tick=()=>{if(!lastUpdated){setAgo("never");return;}
    const d=Math.floor((Date.now()-lastUpdated)/1000);
    if(d<60)setAgo(`${d}s ago`);else if(d<3600)setAgo(`${Math.floor(d/60)}m ago`);else setAgo(`${Math.floor(d/3600)}h ago`);};
    tick();const iv=setInterval(tick,5000);return()=>clearInterval(iv);},[lastUpdated]);
  const dotCls=liveStatus==="live"?"live-dot pulse":liveStatus==="fetching"?"live-dot fetch":liveStatus==="error"?"live-dot err":"live-dot off";
  const stxt=liveStatus==="live"?"Live":liveStatus==="fetching"?"...":liveStatus==="error"?"ESPN down":liveStatus==="off"?"Off":"Idle";
  return <div className="refresh-bar">
    <span className={dotCls}/><span className="refresh-text">{stxt} · {ago}</span>
    <div style={{flex:1}}/>
    {setAutoRefresh&&<label className="auto-toggle"><input type="checkbox" checked={autoRefresh} onChange={e=>setAutoRefresh(e.target.checked)} style={{marginRight:3}}/>
      <span style={{fontSize:10}}>Auto</span></label>}
    <button onClick={onRefresh} className="refresh-btn">{"\u21BB"}</button>
  </div>;}

function Countdown({targetDate}){
  const[left,setLeft]=useState("");const[expired,setExpired]=useState(false);
  useEffect(()=>{const tick=()=>{const diff=new Date(targetDate)-Date.now();
    if(diff<=0){setExpired(true);setLeft("Picks are closed");return;}
    const d=Math.floor(diff/86400000);const h=Math.floor((diff%86400000)/3600000);
    const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);
    const parts=[];if(d)parts.push(`${d}d`);if(h)parts.push(`${h}h`);parts.push(`${m}m`);parts.push(`${s}s`);
    setLeft(parts.join(" "));};tick();const iv=setInterval(tick,1000);return()=>clearInterval(iv);},[targetDate]);
  return <div className={`countdown ${expired?"expired":""}`}>
    {expired?<><span className="cd-icon">🔒</span><span className="cd-text">Picks are closed — tournament has started</span></>
    :<><span className="cd-icon">⏱</span><span className="cd-label">Picks close at first tee:</span>
      <span className="cd-time">{left}</span></>}</div>;}

// ─── LEADERBOARD ───
function LeaderboardView({tournament,picks,scores,lastUpdated,onRefresh,liveStatus,autoRefresh,setAutoRefresh}){
  const tiers=useMemo(()=>buildTiers(DEFAULT_ODDS),[]);
  const lb=useMemo(()=>Object.entries(picks).map(([n,d])=>({name:n,tb:d.tiebreaker,...calcScore(d.picks,scores)}))
    .sort((a,b)=>{if(a.total==null&&b.total==null)return 0;if(a.total==null)return 1;if(b.total==null)return -1;
      if(a.total!==b.total)return a.total-b.total;return Math.abs(a.tb)-Math.abs(b.tb);}),[picks,scores]);
  const[exp,setExp]=useState(null);const has=Object.keys(scores).length>0;
  const pos=lb.map((_,i)=>i===0||lb[i].total==null?i+1:lb[i].total===lb[i-1].total?0:i+1);
  for(let i=1;i<pos.length;i++)if(pos[i]===0)pos[i]=pos[i-1];

  if(!Object.keys(picks).length)return <div className="empty"><p className="empty-b">No picks yet</p><p className="empty-s">Picks appear once submitted.</p></div>;

  return <div><Banner tournament={tournament}/>
    {has&&<RefreshTimer lastUpdated={lastUpdated} onRefresh={onRefresh} liveStatus={liveStatus} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh}/>}
    {!has&&<div className="info"><strong>Waiting for scores</strong> — Tournament hasn't started or scores haven't been imported.</div>}
    <div className="lb"><div className="lb-h"><span className="lb-r">#</span><span className="lb-n">Player</span>
      <span className="lb-sc">Best 4</span><span className="lb-tb hide-mobile">TB</span></div>
    {lb.map((e,i)=><div key={e.name}><div className={`lb-row ${i%2===0?"ev":"od"}`} onClick={()=>setExp(exp===e.name?null:e.name)}>
      <span className={`lb-r ${pos[i]<=3&&has?"t3":""}`}>{pos[i]===1&&has?"🥇":pos[i]===2&&has?"🥈":pos[i]===3&&has?"🥉":pos[i]}</span>
      <span className="lb-n lb-nt">{e.name}<span className="exp-a">{exp===e.name?"▲":"▼"}</span></span>
      <span className={`lb-sc sv ${e.total==null?"n":e.total<0?"u":e.total>0?"o":"ep"}`}>{fmt(e.total)}</span>
      <span className="lb-tb tb-v hide-mobile">{e.tb}</span></div>
    {exp===e.name&&<div className="lb-d"><div className="dg dg-rounds">
      <span className="dh">Golfer</span><span className="dh r">Tot</span><span className="dh r hide-mobile-sm">R1</span><span className="dh r hide-mobile-sm">R2</span><span className="dh r hide-mobile-sm">R3</span><span className="dh r hide-mobile-sm">R4</span><span className="dh r">Thru</span>
      {e.golfers.map((g,j)=>{const p=parseOdds(g.raw);const tk=getTier(g.raw,tiers);const rd=g.rounds||[null,null,null,null];return[
        <span key={`n${j}`} className={`dn ${g.counting?"ct":""}`}>{g.counting&&<span className="dot"/>}{g.name}
          <span className={`tt ${tk}`}>{p.odds}</span></span>,
        <span key={`s${j}`} className={`ds ${g.counting?"ct":""} ${g.score==null?"n":g.score<0?"u":g.score>0?"o":"ep"}`}>{fmt(g.score)}</span>,
        <span key={`r1${j}`} className="ds rd hide-mobile-sm">{rd[0]??"-"}</span>,
        <span key={`r2${j}`} className="ds rd hide-mobile-sm">{rd[1]??"-"}</span>,
        <span key={`r3${j}`} className="ds rd hide-mobile-sm">{rd[2]??"-"}</span>,
        <span key={`r4${j}`} className="ds rd hide-mobile-sm">{rd[3]??"-"}</span>,
        <span key={`t${j}`} className="ds"><ThruBadge thru={g.thru}/></span>];})}
    </div><div className="df">Best 4 = <strong>{e.total!=null?fmt(e.total):"waiting"}</strong>
      <span className="sep">·</span>TB: {e.tb}<span className="sep">·</span><span className="dot"/> = counting</div></div>}
    </div>)}</div>
    {has&&<p className="lb-foot">{Object.keys(picks).length} participants · {Object.keys(scores).length} scored · TB = predicted winner to par</p>}
  </div>;}

function TeamsView({picks,scores}){
  const tiers=useMemo(()=>buildTiers(DEFAULT_ODDS),[]);
  const[selected,setSelected]=useState(null);
  const names=Object.keys(picks).sort();

  // Golfer popularity: how many teams picked each golfer
  const popularity=useMemo(()=>{const m={};Object.values(picks).forEach(d=>d.picks.forEach(p=>{
    const n=parseOdds(p).name;m[n]=(m[n]||0)+1;}));return m;},[picks]);

  if(!names.length)return <div className="empty"><p className="empty-b">No picks yet</p></div>;

  const current=selected||names[0];
  const data=picks[current];
  if(!data)return null;
  const result=calcScore(data.picks,scores);

  return <div>
    {/* Team selector pills */}

// ─── SCOREBOARD (actual tournament leaderboard) ───
function ScoreboardView({tournament,scores,picks,lastUpdated,onRefresh,liveStatus,autoRefresh,setAutoRefresh}){
  // Build full field leaderboard from scores
  const field=useMemo(()=>{
    if(!scores||!Object.keys(scores).length) return [];
    // Which golfers are picked by pool participants?
    const pickedBy={};
    Object.values(picks).forEach(d=>d.picks.forEach(p=>{
      const n=parseOdds(p).name;pickedBy[n]=(pickedBy[n]||[]);pickedBy[n].push(d.name);
    }));
    return Object.entries(scores).map(([name,v])=>{
      const{score,thru,rounds}=typeof v==="number"?{score:v,thru:18,rounds:null}:{score:v.s,thru:v.thru,rounds:v.r||null};
      return {name,score,thru,rounds,owners:pickedBy[name]||[]};
    }).sort((a,b)=>a.score-b.score);
  },[scores,picks]);

  // Assign positions with ties
  const positions=field.map((_,i)=>i===0?1:field[i].score===field[i-1].score?0:i+1);
  for(let i=1;i<positions.length;i++)if(positions[i]===0)positions[i]=positions[i-1];

  const[filter,setFilter]=useState("all"); // all, picked, top20
  const filtered=useMemo(()=>{
    if(filter==="picked") return field.filter(g=>g.owners.length>0);
    if(filter==="top20") return field.slice(0,20);
    return field;
  },[field,filter]);

  if(!Object.keys(scores).length) return <div>
    <Banner tournament={tournament}/>
    <div className="info"><strong>No scores yet</strong> — The tournament scoreboard will appear here once scores are imported via Admin.</div>
  </div>;

  return <div>
    <Banner tournament={tournament}/>
    <RefreshTimer lastUpdated={lastUpdated} onRefresh={onRefresh} liveStatus={liveStatus} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh}/>

    {/* Filter pills */}
    <div className="sb-filters">
      {[["all","All golfers"],["picked","In pool only"],["top20","Top 20"]].map(([k,label])=>
        <button key={k} onClick={()=>setFilter(k)} className={`sb-filter ${filter===k?"on":""}`}>{label}</button>)}
      <span className="sb-ct">{filtered.length} golfers</span>
    </div>

    <div className="sb-table">
      <div className="sb-hdr">
        <span className="sb-pos">Pos</span>
        <span className="sb-name">Golfer</span>
        <span className="sb-scr">Score</span>
        <span className="sb-thru">Thru</span>
        <span className="sb-r hide-mobile-sm">R1</span>
        <span className="sb-r hide-mobile-sm">R2</span>
        <span className="sb-r hide-mobile-sm">R3</span>
        <span className="sb-r hide-mobile-sm">R4</span>
      </div>
      {filtered.map((g,i)=>{
        const origIdx=field.indexOf(g);
        const pos=positions[origIdx];
        const posStr=pos===positions[origIdx-1]?"":pos<=positions[origIdx-1]?pos:pos;
        const rd=g.rounds||[null,null,null,null];
        const hasPicked=g.owners.length>0;
        return <div key={g.name} className={`sb-row ${i%2===0?"ev":"od"} ${hasPicked?"picked":""}`}>
          <span className="sb-pos">{pos<=3?pos===1?"🥇":pos===2?"🥈":"🥉":pos}{field[origIdx-1]&&field[origIdx-1].score===g.score?"T":""}</span>
          <span className="sb-name">
            <span className="sb-gname">{g.name}</span>
            {hasPicked&&<span className="sb-owners">{g.owners.join(", ")}</span>}
          </span>
          <span className={`sb-scr sv ${g.score<0?"u":g.score>0?"o":"ep"}`}>{fmt(g.score)}</span>
          <span className="sb-thru"><ThruBadge thru={g.thru}/></span>
          <span className="sb-r hide-mobile-sm rd-cell">{rd[0]??"-"}</span>
          <span className="sb-r hide-mobile-sm rd-cell">{rd[1]??"-"}</span>
          <span className="sb-r hide-mobile-sm rd-cell">{rd[2]??"-"}</span>
          <span className="sb-r hide-mobile-sm rd-cell">{rd[3]??"-"}</span>
        </div>;
      })}
    </div>
    <p className="lb-foot">{Object.keys(scores).length} golfers · {Object.values(picks).length} pool teams · Highlighted rows = picked in pool</p>
  </div>;}

// ─── PICKS SUBMISSION ───
function PicksView({tournament,tiers,existingPicks,onSubmit,participants}){
  const[name,setName]=useState("");const[tb,setTb]=useState("");
  const[sel,setSel]=useState({top10:[],mid:[],rest:[]});
  const[done,setDone]=useState(false);const[err,setErr]=useState("");const[search,setSearch]=useState("");
  const total=sel.top10.length+sel.mid.length+sel.rest.length;
  const already=useMemo(()=>new Set(Object.keys(existingPicks)),[existingPicks]);
  const avail=useMemo(()=>participants.filter(p=>!already.has(p)),[participants,already]);
  const maxFor=k=>{if(k==="top10")return 2;if(k==="mid")return 3+(2-sel.top10.length);return Math.max(0,7-sel.top10.length-sel.mid.length);};
  const toggle=(k,raw)=>{setErr("");setSel(p=>{
    if(p[k].includes(raw))return{...p,[k]:p[k].filter(g=>g!==raw)};
    if(p[k].length>=maxFor(k)){setErr(`Max ${maxFor(k)} from ${tiers[k].label}`);return p;}
    if(total>=7){setErr("Already 7 selected");return p;}return{...p,[k]:[...p[k],raw]};});};
  const submit=()=>{if(!name){setErr("Select your name");return;}if(already.has(name)){setErr(`${name} already submitted`);return;}
    if(!tb){setErr("Enter tiebreaker");return;}if(total!==7){setErr("Select 7 golfers");return;}
    onSubmit({name,tiebreaker:parseFloat(tb),picks:[...sel.top10,...sel.mid,...sel.rest],timestamp:new Date().toISOString()});setDone(true);};

  if(done)return <div className="empty"><p style={{fontSize:48,margin:"0 0 8px"}}>🏌️</p>
    <p className="empty-b" style={{color:"var(--gd)"}}>Picks submitted, {name}!</p><p className="empty-s">Check the leaderboard once play begins.</p></div>;
  if(tournament?.tiersLocked)return <div className="empty"><p className="empty-b">🔒 Picks locked</p><p className="empty-s">Submission window for {tournament.name} has closed.</p></div>;
  if(!avail.length)return <div className="empty"><p className="empty-b">Everyone's in!</p><p className="empty-s">All participants have submitted. Check the leaderboard.</p></div>;

  const tks=["top10","mid","rest"];const icons={top10:"🏆",mid:"⭐",rest:"🎯"};

  return <div><Banner tournament={tournament}/>
    {tournament.firstTeeTime&&<Countdown targetDate={tournament.firstTeeTime}/>}
    <div className="info"><strong>Rules:</strong> Pick 7 golfers. Up to 2 from Top 10, up to 3 from 11–30
      (more if you skip Top 10), rest from 31+. Best 4 scores count. Lowest wins.
      <br/><em style={{fontSize:12}}>LOOKING AT YOU KALARIS.</em></div>
    <div className="form-r">
      <div className="form-f" style={{flex:"1 1 180px"}}><label className="fl">Your name *</label>
        <select value={name} onChange={e=>{setName(e.target.value);setErr("");}} className="inp sel">
          <option value="">Select name...</option>{participants.map(p=><option key={p} value={p} disabled={already.has(p)}>
            {p}{already.has(p)?" ✓":""}</option>)}</select></div>
      <div className="form-f" style={{flex:"0 0 180px"}}><label className="fl">Tiebreaker (winner to par) *</label>
        <input type="number" value={tb} onChange={e=>setTb(e.target.value)} placeholder="-13" className="inp mono"/></div></div>
    <div className="sub-track"><span className="sub-ct">{already.size}/{participants.length}</span><span> in</span>
      <div style={{flex:1}}/>{already.size>0&&<span className="sub-names">{[...already].join(", ")}</span>}</div>
    <div className={`pc ${total===7?"ok":""}`}><span className="pc-n">{total}/7</span>
      <span className="pc-l">{total===7?" ✓ ready":" selected"}</span><div style={{flex:1}}/>
      {tks.map(k=><span key={k} className={`tc-c ${sel[k].length>=maxFor(k)?"full":""}`}>{tiers[k].label}: {sel[k].length}</span>)}</div>
    <div className="sb"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search golfers..." className="inp" style={{width:"100%"}}/></div>
    {tks.map(k=>{const t=tiers[k];const s=sel[k];const mx=maxFor(k);
      const fg=search?t.golfers.filter(g=>g.name.toLowerCase().includes(search.toLowerCase())):t.golfers;
      if(search&&!fg.length)return null;
      return <div key={k} className="tier"><h3 className="tier-h">{icons[k]} {t.label}<span className="tier-s">— {s.length}/{mx}</span></h3>
        <div className="gg">{fg.map(g=>{const is=s.includes(g.raw);const full=(s.length>=mx||total>=7)&&!is;
          return <button key={g.raw} onClick={()=>toggle(k,g.raw)} disabled={full}
            className={`gb ${is?"on":""} ${full?"off":""}`}><span className="gn">{g.name}</span><span className="go">{g.odds}</span></button>;})}</div></div>;})}
    {err&&<div className="err">{err}</div>}
    <button onClick={submit} disabled={total!==7||!name} className={`sub-btn ${total===7&&name?"rdy":""}`}>
      {!name?"Select your name":total!==7?`Pick ${7-total} more`:  `Submit for ${name}`}</button></div>;}

// ─── ADMIN ───
function AdminView({tournament,picks,scores,setScores,setPicks,setTournament,participants,setLastUpdated}){
  const[si,setSi]=useState("");const[oi,setOi]=useState("");const[msg,setMsg]=useState(null);
  const flash=t=>{setMsg(t);setTimeout(()=>setMsg(null),4000);};
  const importScores=()=>{const ns={};for(const l of si.trim().split("\n")){
    // Format: "1T  Name  -8  F  66 68 70 68" or "Name  -8  14" or just "Name  -8"
    const m=l.trim().match(/^(?:\d+[T]?\s+)?(.+?)\s+([+-]?\d+|E)\s*(?:(?:thru\s*)?(\d+|F))?\s*([\d\s-]*)$/i);
    if(m){const sc=m[2]==="E"?0:parseInt(m[2]);const thru=m[3]?m[3]==="F"||m[3]==="18"?18:parseInt(m[3]):18;
      const rStr=m[4]?.trim();let rounds=null;
      if(rStr){const rParts=rStr.split(/\s+/).map(x=>x==="-"?null:parseInt(x));if(rParts.some(x=>x!==null&&!isNaN(x)))rounds=rParts.map(x=>isNaN(x)?null:x);}
      if(!isNaN(sc))ns[m[1].trim()]={s:sc,thru,...(rounds?{r:rounds}:{})};}}
    const c=Object.keys(ns).length;
    if(c){setScores(p=>({...p,...ns}));setSi("");setLastUpdated(Date.now());flash(`✅ ${c} scores imported`);}else flash("⚠️ No scores parsed");};
  const importOdds=()=>{const ls=oi.trim().split("\n").filter(l=>l.trim());
    if(ls.length){setTournament(p=>({...p,tiers:buildTiers(ls)}));setOi("");flash(`✅ ${ls.length} golfers`);}};
  const exportJSON=()=>{const d={tournament,picks,scores,participants:PARTICIPANTS,exportedAt:new Date().toISOString()};
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:"application/json"}));
    a.download=`${tournament?.id||"pool"}-data.json`;a.click();};
  const importJSON=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tournament)setTournament(d.tournament);
      if(d.picks)setPicks(d.picks);if(d.scores)setScores(d.scores);flash("✅ Imported");}catch{flash("⚠️ Parse error");}};r.readAsText(f);};

  return <div><h2 className="sec-t">Admin</h2>{msg&&<div className="flash">{msg}</div>}
    <section className="ac"><h3 className="ah">Controls</h3><div className="btn-r">
      <button onClick={()=>setTournament(p=>({...p,tiersLocked:!p.tiersLocked}))} className={`btn ${tournament?.tiersLocked?"bd":"bp"}`}>
        {tournament?.tiersLocked?"🔒 Unlock":"🔓 Lock"}</button>
      <button onClick={exportJSON} className="btn bs">📥 Export</button>
      <label className="btn bs" style={{cursor:"pointer"}}>📤 Import<input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/></label>
      <button onClick={()=>{if(confirm("Clear all picks?")){setPicks({});flash("✅ Cleared");}}} className="btn bd">🗑 Reset</button></div>
      <div className="a-stat">Picks: {Object.keys(picks).length}/{participants.length} · Scores: {Object.keys(scores).length} · {tournament?.tiersLocked?"LOCKED 🔒":"OPEN 🔓"}</div></section>
    {Object.keys(picks).length>0&&<section className="ac"><h3 className="ah">Manage picks</h3><p className="ad">Remove to allow re-submit.</p>
      <div className="pm-g">{Object.entries(picks).map(([n,d])=><div key={n} className="pm-r"><span className="pm-n">{n}</span>
        <span className="pm-t">{new Date(d.timestamp).toLocaleDateString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>
        <button onClick={()=>{if(confirm(`Remove ${n}?`)){setPicks(p=>{const x={...p};delete x[n];return x;});flash(`✅ ${n} removed`);}}} className="pm-x">✕</button></div>)}</div></section>}
    <section className="ac"><h3 className="ah">Import scores</h3><p className="ad">Paste ESPN leaderboard. Supports: <code>Name -8 F</code>, <code>1T Name -8 14</code>, <code>Name -8 F 66 68 70 68</code> (with rounds)</p>
      <textarea value={si} onChange={e=>setSi(e.target.value)} rows={8} placeholder={"1  Scottie Scheffler  -8  F  66 68 70 68\n2  Rory McIlroy  -6  14\n3T  Jon Rahm  -5  thru 12\n4  Xander Schauffele  -7  F"} className="ta"/>
      <button onClick={importScores} className="btn bp" style={{marginTop:8}}>Import scores</button></section>
    <section className="ac"><h3 className="ah">Import odds</h3><p className="ad">One per line: <code>Name +odds</code></p>
      <textarea value={oi} onChange={e=>setOi(e.target.value)} rows={5} placeholder="Scottie Scheffler +500\nBryson DeChambeau +1000" className="ta"/>
      <button onClick={importOdds} className="btn bp" style={{marginTop:8}}>Import</button></section>
    {Object.keys(scores).length>0&&<section className="ac"><h3 className="ah">Scores ({Object.keys(scores).length})</h3>
      <div className="sc-g">{Object.entries(scores).sort((a,b)=>(typeof a[1]==="number"?a[1]:a[1].s)-(typeof b[1]==="number"?b[1]:b[1].s)).map(([n,v])=>{
        const{score,thru}=typeof v==="number"?{score:v,thru:18}:{score:v.s,thru:v.thru};
        return <div key={n} className="sc-c"><span>{n}</span><span className={`sv-sm ${score<0?"u":score>0?"o":"ep"}`}>{fmt(score)}</span><ThruBadge thru={thru}/></div>;})}</div></section>}
  </div>;}

// ─── ESPN LIVE SCORES FETCH ───
const ESPN_GOLF_URL = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";
const CORS_PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchESPNScores() {
  for (const makeUrl of CORS_PROXIES) {
    try {
      const res = await fetch(makeUrl(ESPN_GOLF_URL), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      return parseESPNData(data);
    } catch (e) { continue; }
  }
  return null; // all proxies failed
}

function parseESPNData(data) {
  try {
    const events = data.events || [];
    if (!events.length) return null;
    // Find the current/most recent tournament
    const event = events[0];
    const competition = event.competitions?.[0];
    if (!competition) return null;
    const competitors = competition.competitors || [];
    const scores = {};
    let anyActive = false;
    for (const c of competitors) {
      const name = c.athlete?.displayName || c.athlete?.shortName;
      if (!name) continue;
      const scoreToPar = c.score != null ? parseInt(c.score) : null;
      const status = c.status || {};
      const thru = status.period || null;
      const hole = status.type?.description === "Final" ? 18
        : status.type?.description === "Cut" ? 18
        : status.thru || thru || null;
      if (hole && hole < 18) anyActive = true;
      // Round scores from linescores
      const rounds = (c.linescores || []).map(ls => {
        const v = ls.value != null ? parseInt(ls.value) : null;
        return v;
      });
      // Pad to 4 rounds
      while (rounds.length < 4) rounds.push(null);
      if (scoreToPar != null && !isNaN(scoreToPar)) {
        scores[name] = { s: scoreToPar, thru: hole || 18, r: rounds };
      }
    }
    return {
      scores,
      tournamentName: event.name || event.shortName,
      anyActive,
      golferCount: Object.keys(scores).length
    };
  } catch (e) { return null; }
}

      timer = setTimeout(tick, interval);
    };
    tick(); // initial fetch
    return () => { if (timer) clearTimeout(timer); };

.gb.on{border:2px solid var(--gd);background:var(--gl);font-weight:600}.gb.off{opacity:.3;cursor:not-allowed}
.gn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.go{font-family:var(--fm);font-size:11px;color:var(--dim);flex-shrink:0;margin-left:8px}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:var(--r-sm);padding:10px 14px;font-size:14px;margin-bottom:12px}
.sub-btn{width:100%;padding:14px;border:none;border-radius:var(--r-sm);font-size:16px;font-weight:700;cursor:not-allowed;
  font-family:var(--fb);background:var(--bd);color:var(--dim);transition:all .15s;min-height:50px}
.sub-btn.rdy{background:var(--gd);color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(22,163,74,.3)}.sub-btn.rdy:hover{opacity:.9}.sub-btn.rdy:active{transform:scale(.98)}

.sec-t{font-family:var(--fd);font-size:24px;color:var(--tx);margin-bottom:16px}
.hist-l{display:flex;flex-direction:column;gap:10px}
.hist-c{border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;background:var(--card);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--shadow)}
.hist-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-n{font-family:var(--fd);font-size:17px;color:var(--tx)}.hist-b{font-size:10px;font-family:var(--fm);color:var(--dim);background:var(--sa);padding:3px 8px;border-radius:6px;font-weight:600}
.hist-w{font-size:15px;color:var(--gd);margin-bottom:3px}.hist-p{font-size:13px;color:var(--dim)}
.hist-v{font-size:12px;color:var(--dim);font-family:var(--fm);margin-bottom:4px}
.hist-champ{font-size:14px;color:var(--dim);margin-bottom:3px}
.hist-miss{opacity:.4;border-style:dashed}
.atw{border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;background:var(--card);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);margin-bottom:16px;box-shadow:var(--shadow)}
.atw-t{font-family:var(--fd);font-size:18px;color:var(--tx);margin-bottom:10px}
.atw-grid{display:flex;flex-wrap:wrap;gap:6px}
.atw-row{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--sa);border-radius:8px;font-size:15px;min-width:110px}
.atw-pos{font-size:16px;width:24px;text-align:center}.atw-name{font-weight:600;flex:1}.atw-ct{font-family:var(--fm);font-weight:700;color:var(--gd);font-size:16px}
.mono{font-family:var(--fm)}.dim{color:var(--dim)}

.ac{border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;background:var(--card);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--shadow)}
.ah{font-family:var(--fd);font-size:18px;margin-bottom:10px;color:var(--tx)}
.ad{font-size:13px;color:var(--dim);margin-bottom:10px;line-height:1.5}
.ad code{background:var(--sa);padding:2px 6px;border-radius:4px;font-family:var(--fm);font-size:11px}
.a-stat{margin-top:10px;font-size:12px;color:var(--dim);font-family:var(--fm)}
.btn-r{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 14px;border:1px solid var(--bd);border-radius:8px;font-size:14px;font-weight:600;font-family:var(--fb);
  display:inline-flex;align-items:center;gap:4px;min-height:44px;transition:all .15s}
.bp{background:var(--gd);color:#fff;border-color:var(--gd);cursor:pointer;box-shadow:0 2px 6px rgba(22,163,74,.2)}.bp:hover{opacity:.9}.bp:active{transform:scale(.96)}
.bd{background:#ef4444;color:#fff;border-color:#ef4444;cursor:pointer}
.bs{background:var(--sa);color:var(--tx);cursor:pointer}.bs:hover{background:var(--gl)}
.ta{width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:var(--r-sm);font-size:14px;font-family:var(--fm);background:var(--sf);color:var(--tx);resize:vertical;min-height:44px}
.ta:focus{outline:none;border-color:var(--gd);box-shadow:0 0 0 3px var(--gl)}
.flash{background:var(--gl);border:1px solid var(--gd);color:var(--gd);border-radius:var(--r-sm);padding:10px 14px;font-size:14px;margin-bottom:14px}
.sc-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px}
.sc-c{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;background:var(--sa);font-size:13px;font-family:var(--fm);gap:6px}
.pm-g{display:flex;flex-direction:column;gap:4px}
.pm-r{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--sa);border-radius:var(--r-sm);font-size:14px;min-height:44px}
.pm-n{font-weight:600;flex:1}.pm-t{font-family:var(--fm);font-size:11px;color:var(--dim)}
.pm-x{background:none;border:1px solid rgba(239,68,68,.3);color:#ef4444;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}.pm-x:hover{background:rgba(239,68,68,.08)}
.empty{text-align:center;padding:48px 20px}.empty-b{font-size:22px;font-family:var(--fd);color:var(--tx);margin-bottom:8px}
.empty-s{font-size:15px;color:var(--dim);max-width:400px;margin:0 auto;line-height:1.5}

@media(max-width:500px){.form-r{flex-direction:column}.form-f{flex:1 1 auto!important}
  .logo-t{font-size:24px}.banner{padding:12px 16px}.bn{font-size:18px}
  .tc-header{padding:12px 16px}.tc-g{padding:10px 16px}.tc-name{font-size:18px}
  .overlap-row{grid-template-columns:1fr 44px 36px 44px;padding:6px 10px;font-size:13px}}

/* Transition animations for live updates */
.lb-row,.sb-row{transition:background .15s,transform .3s ease,opacity .3s ease}
.lb-row.move-up{animation:slideUp .5s ease}
.lb-row.move-down{animation:slideDown .5s ease}
@keyframes slideUp{0%{transform:translateY(6px);background:var(--gl)}60%{background:var(--gl)}100%{transform:translateY(0)}}
@keyframes slideDown{0%{transform:translateY(-6px);background:rgba(239,68,68,.08)}60%{background:rgba(239,68,68,.08)}100%{transform:translateY(0)}}
.score-change{animation:scorePop .4s ease}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.lb-d{animation:expandIn .25s ease}
@keyframes expandIn{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
  `}</style>
  <div style={{maxWidth:800,margin:"0 auto",padding:"16px 16px 48px",minHeight:"100vh"}}>
    <Header view={view} setView={setView} isAdmin={isAdmin}/>
    {view==="leaderboard"&&<LeaderboardView tournament={tournament} picks={picks} scores={scores} lastUpdated={lastUpdated} onRefresh={handleRefresh} liveStatus={liveStatus} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh}/>}
    {view==="teams"&&<TeamsView picks={picks} scores={scores}/>}
    {view==="scoreboard"&&<ScoreboardView tournament={tournament} scores={scores} picks={picks} lastUpdated={lastUpdated} onRefresh={handleRefresh} liveStatus={liveStatus} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh}/>}
    {view==="picks"&&<PicksFormLink tournament={tournament} formUrl="https://docs.google.com/forms/d/1SRDMuVGPA6rcJVhOIObDcIwVuiYoyjiMYdmK98ryYPs/edit" picks={picks} participants={PARTICIPANTS}/>}
    {/* Future: in-app pick submission — {view==="picks"&&<PicksView tournament={tournament} tiers={tiers} existingPicks={picks} onSubmit={onPick} participants={PARTICIPANTS}/>} */}
    {view==="history"&&<HistoryView history={history}/>}
    {view==="admin"&&<AdminView tournament={tournament} picks={picks} scores={scores}
      setScores={setScores} setPicks={setPicks} setTournament={setTournament} participants={PARTICIPANTS} setLastUpdated={setLastUpdated}/>}
    {view==="bug"&&<BugReportView/>}
    <footer style={{marginTop:40,paddingTop:16,borderTop:"1px solid var(--bd)",fontSize:12,color:"var(--dim)",textAlign:"center",fontFamily:"var(--fm)",letterSpacing:".3px"}}>
      K&M Major Pool · © Kreag</footer></div></>
  );
}


ReactDOM.render(<App/>, document.getElementById('root'));
</script>
